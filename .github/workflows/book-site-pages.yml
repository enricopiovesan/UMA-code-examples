name: Book Site

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "docs/site/**"
      - "docs/seo/**"
      - "book-site/scripts/build_from_content.mjs"
      - "book-site/**"
      - "chapter-13-portable-mcp-runtime/app/**"
      - ".github/workflows/book-site-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "book-site-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install reference app dependencies
        run: npm ci --prefix chapter-13-portable-mcp-runtime/app

      - name: Build reference app
        run: npm --prefix chapter-13-portable-mcp-runtime/app run build

      - name: Build UMA subpages from Markdown
        run: node book-site/scripts/build_from_content.mjs

      - name: Stage reference app for Pages
        shell: bash
        run: |
          rm -rf book-site/reference-application
          mkdir -p book-site/reference-application
          cp -R chapter-13-portable-mcp-runtime/app/dist/. book-site/reference-application/
          cp -R chapter-13-portable-mcp-runtime/app/fixtures book-site/reference-application/fixtures

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "www.universalmicroservices.com",
              "key": "9884a0624b7846d0b0851db5bcafa602",
              "keyLocation": "https://www.universalmicroservices.com/9884a0624b7846d0b0851db5bcafa602.txt",
              "urlList": [
                "https://www.universalmicroservices.com/",
                "https://www.universalmicroservices.com/why-uma/",
                "https://www.universalmicroservices.com/core-model/",
                "https://www.universalmicroservices.com/how-uma-works/",
                "https://www.universalmicroservices.com/proof/",
                "https://www.universalmicroservices.com/comparisons/",
                "https://www.universalmicroservices.com/evolve-uma/",
                "https://www.universalmicroservices.com/learn-uma/",
                "https://www.universalmicroservices.com/discoverability/",
                "https://www.universalmicroservices.com/learn-uma/chapter-01-uma-introduction/",
                "https://www.universalmicroservices.com/learn-uma/chapter-02-device-independent-architecture/",
                "https://www.universalmicroservices.com/learn-uma/chapter-03-what-is-universal-microservices-architecture/",
                "https://www.universalmicroservices.com/learn-uma/chapter-04-from-soa-to-metadata-driven-services/",
                "https://www.universalmicroservices.com/learn-uma/chapter-05-building-portable-microservices/",
                "https://www.universalmicroservices.com/learn-uma/chapter-06-uma-runtime-layer/",
                "https://www.universalmicroservices.com/learn-uma/chapter-07-webassembly-portability-wasm-runtimes/",
                "https://www.universalmicroservices.com/learn-uma/chapter-08-service-contracts-events-orchestration/",
                "https://www.universalmicroservices.com/learn-uma/chapter-09-microservices-to-distributed-systems/",
                "https://www.universalmicroservices.com/learn-uma/chapter-10-security-trust-boundaries-microservices/",
                "https://www.universalmicroservices.com/learn-uma/chapter-11-microservices-architecture-patterns/",
                "https://www.universalmicroservices.com/learn-uma/chapter-12-evolving-distributed-systems/",
                "https://www.universalmicroservices.com/learn-uma/chapter-13-ai-agents-mcp-runtime/",
                "https://www.universalmicroservices.com/learn-uma/chapter-14-uma-reference-application/"
              ]
            }' && echo " — IndexNow submitted"
