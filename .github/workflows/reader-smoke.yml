name: Reader Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  reader-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add wasm32-wasip1

      - name: Install smoke script dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          mkdir -p .bin
          curl -L https://github.com/bytecodealliance/wasmtime/releases/download/v39.0.0/wasmtime-v39.0.0-x86_64-linux.tar.xz -o /tmp/wasmtime-v39.0.0-x86_64-linux.tar.xz
          tar -xf /tmp/wasmtime-v39.0.0-x86_64-linux.tar.xz -C .bin

      - name: Run reader smoke script
        shell: bash
        run: ./scripts/smoke_reader_paths.sh

  reader-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install quality gate dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          cargo install cargo-llvm-cov --locked

      - name: Install Chapter 7 TypeScript dependencies
        shell: bash
        run: npm ci --prefix chapter-07-metadata-orchestration

      - name: Enforce Rust warning hygiene
        shell: bash
        env:
          RUSTFLAGS: -D warnings
        run: |
          cargo test --locked --manifest-path chapter-04-feature-flag-evaluator/Cargo.toml
          cargo test --locked --manifest-path chapter-05-post-fetcher-runtime/Cargo.toml
          cargo test --locked --manifest-path chapter-06-portability-lab/runtime/Cargo.toml
          cargo test --locked --manifest-path chapter-08-service-graph/Cargo.toml
          cargo test --locked --manifest-path chapter-09-trust-boundaries/Cargo.toml
          cargo test --locked --manifest-path chapter-10-architectural-tradeoffs/rust/Cargo.toml
          cargo test --locked --manifest-path chapter-11-evolution-without-fragmentation/rust/Cargo.toml
          cargo test --locked --manifest-path chapter-12-discoverable-decisions/rust/Cargo.toml
          cargo test --locked --manifest-path chapter-13-portable-mcp-runtime/rust/Cargo.toml
          cargo test --locked --manifest-path chapter-07-metadata-orchestration/runtime-rust/Cargo.toml

      - name: Check TypeScript parity implementations
        shell: bash
        run: |
          npm test --prefix chapter-04-feature-flag-evaluator/ts
          npm test --prefix chapter-05-post-fetcher-runtime/ts
          npm test --prefix chapter-06-portability-lab/ts
          npm test --prefix chapter-07-metadata-orchestration
          npm test --prefix chapter-08-service-graph/ts
          npm test --prefix chapter-09-trust-boundaries/ts
          npm test --prefix chapter-10-architectural-tradeoffs/ts
          npm test --prefix chapter-11-evolution-without-fragmentation/ts
          npm test --prefix chapter-12-discoverable-decisions/ts

      - name: Check reader documentation contract
        shell: bash
        run: ./scripts/check_reader_docs.sh

      - name: Enforce Rust coverage floor
        shell: bash
        run: ./scripts/check_rust_coverage.sh
